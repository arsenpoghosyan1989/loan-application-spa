name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Нужные права для GitHub Pages через Actions (OIDC-токен + публикация артефакта).
permissions:
  contents: read
  pages: write
  id-token: write

# Один активный деплой — более новые вытесняют старые.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Версия pnpm берётся из поля "packageManager" в package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # SPA-фолбэк: 404.html = index.html. GitHub Pages отдаёт 404.html
      # при любом "несуществующем" пути, а там React Router поднимет нужный экран.
      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
